<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main Isometric Cube Container -->
  <g transform="translate(50, 50)">
    <!-- Bottom Left Face (Black/Dark) -->
    <path d="M0 0 L-35 -20 L-35 20 L0 40 Z" fill="#121212" />
    <!-- Bottom Right Face (Deep Orange) -->
    <path d="M0 0 L35 -20 L35 20 L0 40 Z" fill="#D45900" />
    <!-- Top Face (Primary Orange) -->
    <path d="M0 0 L-35 -20 L0 -40 L35 -20 Z" fill="#FF6B00" />
    
    <!-- White subtle highlights for visibility on dark/light bgs -->
    <path d="M0 -40 L35 -20 L0 0 L-35 -20 Z" stroke="white" stroke-width="0.5" stroke-opacity="0.3" fill="none" />
  </g>
</svg>
