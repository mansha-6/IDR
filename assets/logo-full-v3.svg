<svg width="450" height="100" viewBox="0 0 450 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Modern Logo: Icon + Space Grotesk Text -->
  <g transform="translate(10, 10)">
    <!-- Icon -->
    <g transform="scale(0.8)">
      <rect x="30" y="20" width="40" height="40" rx="4" stroke="#FF6B00" stroke-width="2.5" transform="rotate(45, 50, 40)" />
      <rect x="35" y="45" width="40" height="40" rx="4" stroke="#121212" stroke-width="2.5" transform="rotate(45, 55, 65)" />
    </g>
    
    <!-- Text Part using Space Grotesk style -->
    <text x="100" y="45" fill="#121212" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="32" letter-spacing="-0.05em">
      INSTITUTE OF
    </text>
    <text x="100" y="80" fill="#FF6B00" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="32" letter-spacing="-0.05em">
      DIGITAL RISK
    </text>
  </g>
</svg>
